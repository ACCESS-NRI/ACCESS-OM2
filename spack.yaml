# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  definitions:
  # _name and _version are reserved definitions that inform deployments
  - _name: [access-om2]
  - _version: [2026.02.001]
  # add package specs to the `specs` list
  specs:
  - access-om2
  packages:
    # Direct dependencies
    cice5:
      require:
      - '@git.5c2159bcfe13b8c597ddf049a80370c1fc8395cd=2026.01.000'  # On branch 'mavx2'
      - 'io_type=PIO build_system=cmake'
      - 'target=x86_64_v3'
    mom5:
      require:
      - '@git.240ceb1b633f917c05499b0eee02940625938e3e=access-om2'  # On branch 'dkhutch-nesi'
      - 'target=x86_64_v3'
    libaccessom2:
      require:
      - '@git.ae9244516f39cb15936819e901466ce11f806855=access-om2'  # On branch 'dkhutch-nesi'
      - 'target=x86_64_v3'
    oasis3-mct:
      require:
      - '@git.2025.03.001'
      - 'target=x86_64_v3'

    # Indirect dependencies
    netcdf-c:
      require:
      - '@4.9.2'
    netcdf-fortran:
      require:
      - '@4.6.1'
    parallelio:
      require:
      - '@2.6.8'
    openmpi:
      require:
      - '@5.0.8'
    access-fms:
      require:
      - '@git.95f4978b8d576b7d3e3b66362a3cfff83f7d3f73=mom5'  # On branch 'dkhutch-nesi'
      - 'cppflags="-DMAXFIELDMETHODS_=600"'
      - 'target=x86_64_v3'
    access-generic-tracers:
      require:
      - '@git.c7a14cb4466a51ea962ec28fec47cab2a4a3f5e4=2026.01.000'  # On branch 'dkhutch-nesi'
      - 'target=x86_64_v3'
    access-mocsy:
      require:
      - '@git.0e180aa968dcb257f318389bf089b59f9116f732=2025.07.002'  # On branch 'dkhutch-nesi'
      - 'target=x86_64_v3'
    c:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    cxx:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    fortran:
      require:
      - 'intel-oneapi-compilers@2025.2.0'
    all:
      require:
      - 'target=x86_64_v4'
  view: true
  concretizer:
    unify: true
